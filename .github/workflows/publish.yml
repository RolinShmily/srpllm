# Publish to npm via Trusted Publisher (OIDC)
#
# Prerequisites (one-time npm setup):
#   https://www.npmjs.com/package/srpllm → Settings → Trusted Publishers → Add Publisher
#   Publisher:       GitHub Actions
#   Org or user:     RolinShmily
#   Repository:      srpllm
#   Workflow file:   publish.yml
#   Environment:     (leave blank)
#   Allowed actions: default

name: publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write       # required for OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Debug: confirm npm version
      - run: node --version && npm --version

      # OIDC publish — ensure no stale .npmrc
      - run: |
          rm -f .npmrc ~/.npmrc
          npm publish --provenance --no-git-checks
        env:
          npm_config_registry: https://registry.npmjs.org/
