name: publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# OIDC 必须权限（与官方文档一致）
permissions:
  id-token: write 
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      # 完全对齐官方推荐环境
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # 满足 >= 22.14.0 的要求
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # 【最关键的一步】：直接使用 npm publish。
      # 官方说明：不要加 --provenance，npm 11+ 会自动处理。
      - run: npm publish --access public