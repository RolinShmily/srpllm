# Publish to npm via Trusted Publisher (OIDC)
#
# Prerequisites (one-time npm setup):
#   https://www.npmjs.com/package/srpllm → Settings → Trusted Publishers → Add Publisher
#   Publisher:       GitHub Actions
#   Org or user:     RolinShmily
#   Repository:      srpllm
#   Workflow file:   publish.yml
#   Environment:     (leave blank)
#   Allowed actions: default

name: publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write       # required for OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Debug: print OIDC token claims
      - name: Debug OIDC claims
        run: |
          echo "=== npm version ==="
          npm --version
          echo "=== OIDC claims (aud=sigstore) ==="
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sigstore" | jq -r '.value')
          echo "$TOKEN" | jq -R 'split(".") | .[1] | @base64d | fromjson'
          echo "=== OIDC claims (aud=npm) ==="
          TOKEN2=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm" | jq -r '.value')
          echo "$TOKEN2" | jq -R 'split(".") | .[1] | @base64d | fromjson'

      - run: npm publish --provenance --no-git-checks
